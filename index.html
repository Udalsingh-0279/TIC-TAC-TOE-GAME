<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIC-TAC-TOE Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Welcome to TIC-TAC-TOE Game</h1>
    </div>
   <div class="msg-winner hidden">
    <p id="msg">winner</p>
       <button id="new-game-btn">New Game</button>
   </div>
        
    <main>
        <h1 style="color: aqua; margin-top: 10px;">TIC-TAC-TOE</h1>
        <div class="container">
            <div class="game">
            <button class="box" id="0"></button>   
            <button class="box" id="1"></button>
            <button class="box" id="2"></button>
            <button class="box" id="3"></button>
            <button class="box" id="4"></button>
            <button class="box" id="5"></button>
            <button class="box" id="6"></button>
            <button class="box" id="7"></button>
            <button class="box" id="8"></button>
            </div>
        </div>
        <button id="reset">Reset Game</button>
    </main>
    <footer>
        <p style="color:azure">&copy; developed by Udal Singh 2026</p>
    </footer>
    <script src="javascript.js"></script>  
</body>
</html>
